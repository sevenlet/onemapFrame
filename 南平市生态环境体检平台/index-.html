  <body>
    <div id="app"></div>

    <script>
      let qs = Qs;
      const app = createApp(MainComponent);
      /* 下面的操作是去掉控制台Vue输出的警告信息  如果想开启警告信息可以把这个空函数注释掉 */
      app.config.warnHandler = function (msg, vm, trace) {
        // 空函数，不做任何处理
      };
      app.use(i18n)
        .use(router)
        .use(ElementPlus, {
          size: 'small',
          locale: ElementPlusLocaleZhCn,
          i18n: (key, value) => i18n.global.t(key, value),
        })
        .use(ThsDesign)
        .component('headerCenterComponent', headerCenterComponent)
        .component('areaSelectComponent', areaSelectComponent)
        .component('leftMenuComponent', leftMenuComponent)
        .component('targetComponent', targetComponent)
        .component('rightContainerComponent', rightContainerComponent)
        .component('integratedQueryComponent', integratedQueryComponent)
        .component('mainContainerComponent', mainContainerComponent)
        .component('mapContainerComponent', mapContainerComponent)
        .component('testLegoViewComponent', testLegoViewComponent)
        .component('oldScreenGlobalVariableComponent', oldScreenGlobalVariableComponent)
        .component('mainContainerNavCenterComponent', mainContainerNavCenterComponent)
        .component('headerComponent', headerComponent)
        .component('saveCustomDrawComponent', saveCustomDrawComponent)
        .component('noviceGuideComponent', noviceGuideComponent)
        .component('znxlEntryComponent', znxlEntryComponent)
        .mount("#app");
    </script>
