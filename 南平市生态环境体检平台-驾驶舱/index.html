    <div id="app"></div>
	<script>
      // 初始化全局变量对象 - 用于存储所有动态加载的全局变量模块
      window.legoGlobalVariables = {};

      /**
       * 处理全局变量文件
       * @param file
       */
      function processVariableFile(file) {
        // 从文件路径中提取文件名（不含扩展名）作为模块名
        const fileName = file.split('/').pop().replace('.js', '');
        // 如果没有模块名 则直接返回
        if (!window.moduleGlobalVariables[fileName]) return;
        // 将模块全局变量存储到legoGlobalVariables对象中
        window.legoGlobalVariables[fileName] = window.moduleGlobalVariables[fileName];
        if (window.moduleGlobalVariables[fileName]?.fromPublic) {
          // 在这里将专题里来自公共变量的合并到全局公共变量
          window.publicGlobalVariables = Object.assign({}, window.moduleGlobalVariables[fileName]?.fromPublic, window.publicGlobalVariables)
          // 删除专题下面fromPublic字段 因为已经放到公共变量中了
          delete window.legoGlobalVariables[fileName].fromPublic;
        }
      }

      /**
       * 启动应用函数
       */
       const startApp = () => {
        window.qs = Qs;
        window.app = createApp(MainComponent);
        window.app.use(i18n)
          .use(router)
          .use(ElementPlus, {
            size: 'small',
            locale: ElementPlusLocaleZhCn,
            i18n: (key, value) => i18n.global.t(key, value),
          })

.use(ThsDesign).mount("#app");
      };

      // 使用ResourceLoader加载脚本 先加载全局变量文件后 再加载全局函数
      window.ResourceLoader.loadScripts(window.legoGlobalVariableFiles, processVariableFile)
        .then(() => {
          window.globalFilesLoaded = true;
          document.dispatchEvent(new Event('globalFilesLoaded'));
          // 加载全局函数
          return window.ResourceLoader.loadScripts(window.legoGlobalFunctionFiles);
        })
        .then(() => {
          startApp();
        })
        .catch(error => {
          console.error('脚本加载过程中发生错误:', error);
        });
    </script>
