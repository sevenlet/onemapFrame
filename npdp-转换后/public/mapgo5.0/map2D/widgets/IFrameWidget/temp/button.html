<!DOCTYPE html>
<html>
<head lang="en">
    <meta charset="UTF-8">
    <title></title>
    <script type="text/javascript"
            src="http://webapi.amap.com/maps?v=1.3&key=d274e88b43dc43af63b5354a925cae82&plugin=AMap.Autocomplete,AMap.PlaceSearch"></script>
    <script type="text/javascript">
        function onload() {
            parent.removePopupWindow();
        }
        function search() {
            var keywords = document.getElementById('keyword').value;
            if (keywords == "") {
                return;
            }
            else {
                var placeSearch = new AMap.PlaceSearch({ //构造地点查询类
                    pageSize: 5,
                    pageIndex: 1,
                    count: 1000,
                    city: "上海市",  //城市
                    panel: "panel"
                });
                //关键字查询
                placeSearch.search(keywords, function (status, result) {
                    var models = result.poiList.pois;
                    var graphics = [];
                    for (var model in models) {
                        var x = models[model].location.lng;
                        var y = models[model].location.lat;
                        var name1 = models[model].name;
                        var address1 = models[model].address;
                        var gemotry = {"x": x, "y": y, "spatialReference": {"wkid": 4326}};
                        var attribute = {"Name": name1, "Address": address1};
                        var graphic = {gemotry, attribute};
                        graphics.push(graphic);
                    }
                    var layer = parent.map.getLayer("结果图层");
                    if (layer === undefined) {
                        addGraphics(graphics);
                    }else{
                        parent.removeLayer("结果图层");
                        parent.removePopupWindow();
                        addGraphics(graphics);
                    }
                });
            }
        }
        function addGraphics(graphics) {
            //var keywords =document.getElementById('keyword').value;
            for (var graphic in graphics) {
                var pointinfo = [    //以下为数组，这里只写了一个。
                    {
                        "geometry": graphics[graphic].gemotry,
                        "attributes": graphics[graphic].attribute,
                        "symbol": {
                            "type": "esriPMS",
                            "url": "./widgets/IFrameWidget/images/C.png", //图片位置   真正点的坐标在图片中心点，如果要将图片上移，yoffset为正，右移 xoffset为正
                            "width": 30, //当前图片宽度
                            "height": 30,//当前图片高度
                            "xoffset": 0,
                            "yoffset": 0
                        }
                    }
                ];
                parent.addGraphic("结果图层", null, pointinfo, {click: showinfowindow}, null, false);
            }

            if (graphics.length === 1) {
                parent.zoomToPoint(graphics[0].gemotry.x, graphics[0].gemotry.y.null, 0.02);
            }
            else {
                // parent.unionExtent(graphics1, null);
            }
        }
        function showinfowindow(event) {
            var content = "名称：" + event.graphic.attributes.Name + "<br>地址：" + event.graphic.attributes.Address + "<br>经度：" + event.graphic.geometry.x + "<br>纬度：" + event.graphic.geometry.y;
            parent.showPopupWindow("详细信息", content, event.graphic.geometry.x, event.graphic.geometry.y, null);
        }
        function remove() {
            if (document.getElementById('keyword').value == "") {
                parent.removePopupWindow();
                parent.removeLayer("结果图层");
            }
        }
    </script>
</head>
<body onload="">
<input type="text" id="keyword" onchange="remove()">&nbsp;&nbsp;
<button style="width: 50px;height:30px;background:darkkhaki" onclick="search()">搜索</button>

<div style="width: 200px;height: 300px" id="panel"></div>
</body>
</html>
