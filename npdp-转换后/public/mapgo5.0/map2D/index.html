  <style type="text/css">
    * {
      box-sizing: border-box;
    }

    body,
    html {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden;
    }

    #main-loading {
      width: 100%;
      height: 100%;
      text-align: center;
      overflow: hidden;
    }

    #main-page {
      display: none;
      width: 100%;
      height: 100%;
      position: relative;
    }

    #jimu-layout-manager {
      width: 100%;
      height: 100%;
      position: absolute;
    }

    #main-loading.loading-fadeOut {
      opacity: 0 !important;
    }

    #main-loading {
      background-color: #508dca;
      position: relative;
    }

    #main-loading #app-loading {
      position: absolute;
      background-repeat: no-repeat;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }

    #main-loading #loading-gif {
      position: absolute;
      background-image: url("images/loading/predefined_loading_1.gif");
      background-repeat: no-repeat;
      width: 58px;
      height: 29px;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }

    #map_root.esriMapContainer {
      z-index: 0 !important;
    }

    #map_layers {
      z-index: unset !important;
    }

    #ths_heatmap_layer,
    #ths_heatmap_layer img {
      transform: unset !important;
    }
  </style>
